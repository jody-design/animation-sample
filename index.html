<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1000, initial-scale=1.0" />
  <title>팔로우 급상승 애니메이션 샘플</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #F3F4F5;
      font-family: Pretendard, 'Noto Sans KR', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 32px;
      padding: 40px 24px;
    }

    /* ────────────────────────────────
       카드 (모바일 프리뷰)
    ──────────────────────────────── */
    .card {
      width: 375px;
      flex-shrink: 0;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 2px 12px rgba(6,11,17,0.08);
      overflow: hidden;
    }

    /* 12px separator */
    .card__separator {
      height: 12px;
      background: rgba(135,146,156,0.1);
    }

    /* 헤더 */
    .card__header {
      padding: 20px 24px 0;
    }

    .card__title {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 18px;
      font-weight: 600;
      color: #060B11;
      line-height: 26px;
    }

    .card__subtitle {
      font-size: 12px;
      font-weight: 400;
      color: rgba(6,11,17,0.56);
      line-height: 20px;
      margin-top: 2px;
    }

    /* ────────────────────────────────
       리스트 애니메이션
    ──────────────────────────────── */
    .list-wrapper {
      position: relative;
      overflow: hidden;
      height: 156px;
      margin-top: 8px;
    }

    .list-block {
      position: absolute;
      top: 0; left: 0; right: 0;
    }

    .list-block.exit {
      animation: blockFadeOut var(--fade-duration, 180ms) ease-out forwards;
    }

    @keyframes blockFadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    @keyframes itemSlideUp {
      from { opacity: 0; transform: translateY(var(--slide-distance, 60px)); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .list-block.enter .follow-item {
      opacity: 0;
      animation: itemSlideUp var(--item-duration, 350ms) var(--easing, ease-in) forwards;
    }

    .list-block.enter .follow-item:nth-child(1) { animation-delay: 0ms; }
    .list-block.enter .follow-item:nth-child(2) { animation-delay: var(--stagger, 50ms); }
    .list-block.enter .follow-item:nth-child(3) { animation-delay: calc(var(--stagger, 50ms) * 2); }

    /* ────────────────────────────────
       팔로우 아이템
    ──────────────────────────────── */
    .follow-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 24px;
      height: 52px;
      background: #fff;
    }

    /* 스쿼클 마스크 아바타 */
    .follow-avatar {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      position: relative;
    }

    .follow-avatar__inner {
      position: absolute;
      inset: 0;
      mask-size: 36px 36px;
      mask-position: 0 0;
      mask-repeat: no-repeat;
      -webkit-mask-size: 36px 36px;
      -webkit-mask-position: 0 0;
      -webkit-mask-repeat: no-repeat;
    }

    .follow-avatar__bg {
      position: absolute;
      inset: 0;
    }

    .follow-avatar__img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .follow-text {
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .follow-name {
      font-size: 12px;
      font-weight: 400;
      color: #060B11;
      line-height: 20px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .follow-count {
      font-size: 14px;
      font-weight: 600;
      color: #060B11;
      line-height: 20px;
    }

    .follow-btn {
      background: #FFEB00;
      border: none;
      border-radius: 16px;
      padding: 6px 14px;
      font-size: 14px;
      font-weight: 600;
      color: #060B11;
      cursor: pointer;
      flex-shrink: 0;
      line-height: 20px;
      font-family: inherit;
      white-space: nowrap;
      transition: transform 0.15s, background 0.15s, color 0.15s;
    }

    .follow-btn:active {
      transform: scale(0.95);
    }

    .follow-btn.followed {
      background: #F3F4F5;
      color: rgba(6,11,17,0.56);
    }

    /* ────────────────────────────────
       푸터: 더보기
    ──────────────────────────────── */
    .card__footer {
      border-top: 0.5px solid rgba(135,146,156,0.2);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .card__footer:active { opacity: 0.6; }

    .footer__text { font-size: 16px; font-weight: 400; color: rgba(6,11,17,0.56); line-height: 24px; }

    .footer__icon { display: flex; align-items: center; }
    .footer__icon.spin .spin-target { animation: spinOnce 0.45s cubic-bezier(0.22,1,0.36,1); }
    @keyframes spinOnce {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ────────────────────────────────
       컨트롤 패널
    ──────────────────────────────── */
    .panel {
      width: 300px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 2px 12px rgba(6,11,17,0.08);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-self: flex-start;
    }

    .panel__title {
      font-size: 15px;
      font-weight: 700;
      color: #060B11;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(6,11,17,0.06);
    }

    .control { display: flex; flex-direction: column; gap: 8px; }

    .control__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .control__label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(6,11,17,0.54);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .control__value {
      font-size: 13px;
      font-weight: 700;
      color: #060B11;
      min-width: 52px;
      text-align: right;
    }

    input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #E5E7EA;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #060B11;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(6,11,17,0.2);
    }

    .easing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .easing-btn {
      padding: 8px 0;
      font-size: 12px;
      font-weight: 600;
      color: rgba(6,11,17,0.54);
      background: #F3F4F5;
      border: 1.5px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      font-family: inherit;
    }

    .easing-btn.active {
      color: #060B11;
      background: #fff;
      border-color: #060B11;
    }

    .divider { height: 1px; background: rgba(6,11,17,0.06); }

    .play-btn {
      width: 100%;
      padding: 13px;
      background: #FFCD00;
      color: #060B11;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.15s;
      font-family: inherit;
    }
    .play-btn:active { opacity: 0.8; }

    .share-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .share-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 0;
      font-size: 12px;
      font-weight: 600;
      border: 1.5px solid rgba(6,11,17,0.12);
      border-radius: 10px;
      background: #fff;
      color: #060B11;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .share-btn:active { background: #F3F4F5; }
    .share-btn.copied { border-color: #00A86B; color: #00A86B; }

    .code-section { display: flex; flex-direction: column; gap: 0; }

    .code-tabs {
      display: flex;
      gap: 2px;
      background: #EAEBEC;
      border-radius: 10px 10px 0 0;
      padding: 3px;
    }

    .code-tab {
      flex: 1;
      padding: 6px 0;
      font-size: 11px;
      font-weight: 700;
      color: rgba(6,11,17,0.4);
      background: transparent;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
      font-family: inherit;
    }

    .code-tab.active {
      background: #fff;
      color: #060B11;
      box-shadow: 0 1px 3px rgba(6,11,17,0.1);
    }

    .code-box {
      background: #1C1E23;
      border-radius: 0 0 10px 10px;
      padding: 14px;
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      line-height: 1.75;
      white-space: pre;
      overflow-x: auto;
      position: relative;
      cursor: pointer;
      min-height: 80px;
    }

    .code-box:hover .code-copy-hint { opacity: 1; }

    .code-copy-hint {
      position: sticky;
      float: right;
      top: 0;
      font-size: 10px;
      font-family: 'SF Mono', monospace;
      color: rgba(255,255,255,0.3);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      margin-left: 8px;
    }

    .tok-comment { color: #6B737E; }
    .tok-selector { color: #79B8FF; }
    .tok-prop { color: #B392F0; }
    .tok-val { color: #9ECBFF; }
    .tok-num { color: #F8B195; }
    .tok-kw { color: #F97583; }
    .tok-fn { color: #FFCD00; }
    .tok-str { color: #9ECBFF; }
    .tok-plain { color: #CDD5DF; }
  </style>
</head>

<!-- 컨트롤 패널 -->
<div class="panel">
  <div class="panel__title">애니메이션 조절</div>

  <div class="control">
    <div class="control__header">
      <span class="control__label">Duration</span>
      <span class="control__value" id="val-duration">350ms</span>
    </div>
    <input type="range" id="ctrl-duration" min="100" max="800" step="10" value="300" oninput="updateConfig()">
  </div>

  <div class="control">
    <div class="control__header">
      <span class="control__label">Stagger</span>
      <span class="control__value" id="val-stagger">50ms</span>
    </div>
    <input type="range" id="ctrl-stagger" min="0" max="150" step="5" value="60" oninput="updateConfig()">
  </div>

  <div class="control">
    <div class="control__header">
      <span class="control__label">Slide Distance</span>
      <span class="control__value" id="val-distance">60px</span>
    </div>
    <input type="range" id="ctrl-distance" min="10" max="120" step="5" value="60" oninput="updateConfig()">
  </div>

  <div class="control">
    <div class="control__header">
      <span class="control__label">Fade-out Duration</span>
      <span class="control__value" id="val-fade">180ms</span>
    </div>
    <input type="range" id="ctrl-fade" min="50" max="400" step="10" value="240" oninput="updateConfig()">
  </div>

  <div class="divider"></div>

  <div class="control">
    <div class="control__header">
      <span class="control__label">Easing</span>
    </div>
    <div class="easing-grid">
      <button class="easing-btn" data-easing="ease-in" onclick="setEasing(this)">ease-in</button>
      <button class="easing-btn active" data-easing="ease-out" onclick="setEasing(this)">ease-out</button>
      <button class="easing-btn" data-easing="ease-in-out" onclick="setEasing(this)">ease-in-out</button>
      <button class="easing-btn" data-easing="linear" onclick="setEasing(this)">linear</button>
      <button class="easing-btn" data-easing="cubic-bezier(0.22,1,0.36,1)" onclick="setEasing(this)">spring</button>
      <button class="easing-btn" data-easing="cubic-bezier(0.34,1.56,0.64,1)" onclick="setEasing(this)">bounce</button>
    </div>
  </div>

  <div class="divider"></div>

  <button class="play-btn" onclick="switchPage()">▶ 애니메이션 실행</button>

  <div class="divider"></div>

  <div class="control__label" style="margin-bottom:-8px">공유하기</div>
  <div class="share-group">
    <button class="share-btn" id="btn-link" onclick="copyLink()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M5.5 8.5l3-3M8 5.5a2 2 0 0 1 2.83 2.83l-1.5 1.5A2 2 0 0 1 6.5 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M6 8.5a2 2 0 0 1-2.83-2.83l1.5-1.5A2 2 0 0 1 7.5 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      링크 복사
    </button>
    <button class="share-btn" id="btn-css" onclick="copyCss()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <rect x="1" y="2" width="8" height="10" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M4 5h4M4 7.5h3M4 10h2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M9 4l4 0M9 7l4 0M9 10l4 0" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity=".3"/>
      </svg>
      CSS 복사
    </button>
    <button class="share-btn" id="btn-html" onclick="downloadHtml()" style="grid-column: span 2;">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v8M4.5 6.5L7 9l2.5-2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 10v1.5A1.5 1.5 0 0 0 3.5 13h7A1.5 1.5 0 0 0 12 11.5V10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      HTML 파일 다운로드
    </button>
  </div>

  <div class="code-section">
    <div class="code-tabs">
      <button class="code-tab active" onclick="setCodeTab('css', this)">CSS</button>
      <button class="code-tab" onclick="setCodeTab('js', this)">JavaScript</button>
      <button class="code-tab" onclick="setCodeTab('react', this)">React</button>
    </div>
    <div class="code-box" id="codeOutput" onclick="copyCurrentTab()">
      <span class="code-copy-hint">클릭해서 복사</span>
    </div>
  </div>
</div>

<script>
  // 스쿼클 마스크 (FollowModule.tsx 기준)
  const MASK_SVG_URL = 'data:image/svg+xml,' + encodeURIComponent(
    '<svg preserveAspectRatio="none" width="100%" height="100%" overflow="visible" style="display:block;" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M18 36C4.75007 36 0 31.2502 0 18C0 5.24989 4.75007 0 18 0C31.2502 0 36 4.75007 36 18C36 31.2502 31.2502 36 18 36Z" fill="white"/></svg>'
  );

  const pages = [
    [
      { name: '일이삼사오육칠팔구십일이삼', followers: '팔로워 5천', showBtn: true,  followed: false, bg: '#b8a7ff', img: 'https://images.unsplash.com/photo-1772371272167-0117a6573d58?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=400' },
      { name: '겸손한포도',                 followers: '팔로워 500', showBtn: false, followed: true,  bg: '#c7bdff', img: 'https://images.unsplash.com/photo-1673047234576-76748e7cc74f?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=400' },
      { name: '일이삼사오육칠팔구십일이삼', followers: '팔로워 5',   showBtn: true,  followed: false, bg: '#b8a7ff', img: 'https://images.unsplash.com/photo-1772371272167-0117a6573d58?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=400' },
    ],
    [
      { name: '카카오페이운용', followers: '팔로워 3.2만', showBtn: true,  followed: false, bg: '#FFD6A5', img: 'https://images.unsplash.com/photo-1580489944761-15a19d654956?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=400' },
      { name: '강남핀테크',     followers: '팔로워 1.8천', showBtn: false, followed: true,  bg: '#A8E6CF', img: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=400' },
      { name: '투자의신',       followers: '팔로워 12',    showBtn: true,  followed: false, bg: '#FFB3C1', img: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=400' },
    ],
  ];

  let current = 1;
  let animating = false;

  let config = { duration: 300, stagger: 60, distance: 60, fade: 240, easing: 'ease-out' };

  function applyConfig() {
    const root = document.documentElement;
    root.style.setProperty('--item-duration', config.duration + 'ms');
    root.style.setProperty('--stagger', config.stagger + 'ms');
    root.style.setProperty('--slide-distance', config.distance + 'px');
    root.style.setProperty('--fade-duration', config.fade + 'ms');
    root.style.setProperty('--easing', config.easing);
  }

  function updateConfig() {
    config.duration = +document.getElementById('ctrl-duration').value;
    config.stagger   = +document.getElementById('ctrl-stagger').value;
    config.distance  = +document.getElementById('ctrl-distance').value;
    config.fade      = +document.getElementById('ctrl-fade').value;

    document.getElementById('val-duration').textContent = config.duration + 'ms';
    document.getElementById('val-stagger').textContent  = config.stagger + 'ms';
    document.getElementById('val-distance').textContent = config.distance + 'px';
    document.getElementById('val-fade').textContent     = config.fade + 'ms';

    applyConfig(); saveToHash(); renderCode();
  }

  function setEasing(btn) {
    document.querySelectorAll('.easing-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    config.easing = btn.dataset.easing;
    applyConfig(); saveToHash(); renderCode();
  }

  function toggleFollow(btn) {
    const isFollowed = btn.classList.toggle('followed');
    btn.textContent = isFollowed ? '팔로잉' : '팔로우';
  }

  function buildBlock(items) {
    const block = document.createElement('div');
    block.className = 'list-block';
    const maskStyle = `mask-image:url('${MASK_SVG_URL}');-webkit-mask-image:url('${MASK_SVG_URL}');mask-size:36px 36px;mask-position:0 0;mask-repeat:no-repeat;-webkit-mask-size:36px 36px;-webkit-mask-position:0 0;-webkit-mask-repeat:no-repeat;`;
    block.innerHTML = items.map(item => `
      <div class="follow-item">
        <div class="follow-avatar">
          <div class="follow-avatar__inner" style="${maskStyle}">
            <div class="follow-avatar__bg" style="background:${item.bg}"></div>
            <img class="follow-avatar__img" src="${item.img}" alt="${item.name}" />
          </div>
        </div>
        <div class="follow-text">
          <div class="follow-name">${item.name}</div>
          <div class="follow-count">${item.followers}</div>
        </div>
        ${item.showBtn ? `<button class="follow-btn${item.followed ? ' followed' : ''}" onclick="toggleFollow(this)">${item.followed ? '팔로잉' : '팔로우'}</button>` : ''}
      </div>
    `).join('');
    return block;
  }

  function loadFromHash() {
    try {
      const hash = location.hash.slice(1);
      if (!hash) return;
      const params = new URLSearchParams(hash);
      if (params.get('d'))  { config.duration = +params.get('d');  document.getElementById('ctrl-duration').value = config.duration; }
      if (params.get('s'))  { config.stagger  = +params.get('s');  document.getElementById('ctrl-stagger').value  = config.stagger; }
      if (params.get('di')) { config.distance = +params.get('di'); document.getElementById('ctrl-distance').value = config.distance; }
      if (params.get('f'))  { config.fade     = +params.get('f');  document.getElementById('ctrl-fade').value     = config.fade; }
      if (params.get('e'))  {
        config.easing = decodeURIComponent(params.get('e'));
        document.querySelectorAll('.easing-btn').forEach(b => {
          b.classList.toggle('active', b.dataset.easing === config.easing);
        });
      }
    } catch(e) {}
  }

  function saveToHash() {
    const p = new URLSearchParams({ d: config.duration, s: config.stagger, di: config.distance, f: config.fade, e: encodeURIComponent(config.easing) });
    history.replaceState(null, '', '#' + p.toString());
  }

  function flashBtn(id) {
    const btn = document.getElementById(id);
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 1800);
  }

  function copyLink() {
    saveToHash();
    navigator.clipboard.writeText(location.href).then(() => flashBtn('btn-link'));
  }

  let currentTab = 'css';

  function setCodeTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.code-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCode();
  }

  function highlight(code, lang) {
    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    let c = esc(code);
    if (lang === 'css') {
      c = c
        .replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="tok-comment">$1</span>')
        .replace(/(@keyframes\s+\S+|[\w-.]+(?=\s*\{))/g, '<span class="tok-selector">$1</span>')
        .replace(/([\w-]+)(?=\s*:)/g, '<span class="tok-prop">$1</span>')
        .replace(/:\s*([^;{}\n]+)/g, (m, v) => ': <span class="tok-val">' + v + '</span>')
        .replace(/(\d+(?:ms|px|s|%))/g, '<span class="tok-num">$1</span>');
    } else {
      c = c
        .replace(/(\/\/[^\n]*)/g, '<span class="tok-comment">$1</span>')
        .replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="tok-comment">$1</span>')
        .replace(/\b(const|let|var|function|return|if|else|export|import|from|default|type|interface|extends|async|await|setTimeout|clearTimeout|useRef|useState)\b/g, '<span class="tok-kw">$1</span>')
        .replace(/\b([A-Z][a-zA-Z]+)\b/g, '<span class="tok-fn">$1</span>')
        .replace(/(`[^`]*`|&#39;[^&#39;]*&#39;|&quot;[^&quot;]*&quot;)/g, '<span class="tok-str">$1</span>')
        .replace(/\b(\d+)\b/g, '<span class="tok-num">$1</span>');
    }
    return '<span class="tok-plain">' + c + '</span>';
  }

  function renderCode() {
    const box = document.getElementById('codeOutput');
    const hint = box.querySelector('.code-copy-hint');
    const lang = currentTab === 'css' ? 'css' : 'js';
    box.innerHTML = highlight(getCodeText(currentTab), lang);
    box.appendChild(hint);
  }

  function getCodeText(tab) {
    const s = config.stagger, d = config.duration, dist = config.distance, f = config.fade, e = config.easing;

    if (tab === 'css') return `/* 진입: 아이템 개별 slide-up */
@keyframes itemSlideUp {
  from {
    opacity: 0;
    transform: translateY(${dist}px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 퇴장: 구 리스트 fade-out */
@keyframes blockFadeOut {
  from { opacity: 1; }
  to   { opacity: 0; }
}

.list-block.enter .follow-item {
  opacity: 0;
  animation: itemSlideUp ${d}ms ${e} forwards;
}

/* stagger */
.list-block.enter .follow-item:nth-child(1) { animation-delay: 0ms; }
.list-block.enter .follow-item:nth-child(2) { animation-delay: ${s}ms; }
.list-block.enter .follow-item:nth-child(3) { animation-delay: ${s * 2}ms; }

.list-block.exit {
  animation: blockFadeOut ${f}ms ease-out forwards;
}`;

    if (tab === 'js') return `// 리스트 전환 함수
function switchList(wrapper, nextItems, buildFn) {
  const STAGGER = ${s};
  const DURATION = ${d};
  const FADE = ${f};

  const oldBlock = wrapper.querySelector('.list-block');
  const newBlock = buildFn(nextItems);

  oldBlock.style.animation =
    \`blockFadeOut \${FADE}ms ease-out forwards\`;
  oldBlock.addEventListener('animationend',
    () => oldBlock.remove(), { once: true });

  newBlock.classList.add('enter');
  wrapper.appendChild(newBlock);

  const items = newBlock.querySelectorAll('.follow-item');
  items.forEach((el, i) => {
    el.style.animationDelay = \`\${i * STAGGER}ms\`;
  });

  const last = items[items.length - 1];
  last.addEventListener('animationend', () => {
    newBlock.classList.remove('enter');
    items.forEach(el =>
      el.style.removeProperty('opacity'));
  }, { once: true });
}`;

    if (tab === 'react') return `// useListAnimation.ts
import { useRef, useState } from 'react';

const STAGGER = ${s};
const DURATION = ${d};
const FADE_DURATION = ${f};

export function useListAnimation() {
  const [page, setPage] = useState(0);
  const [animState, setAnimState] = useState<
    'idle' | 'exit' | 'enter'
  >('idle');
  const timer = useRef<ReturnType<typeof setTimeout>>();

  const next = (total: number) => {
    if (animState !== 'idle') return;
    setAnimState('exit');
    timer.current = setTimeout(() => {
      setPage(p => (p + 1) % total);
      setAnimState('enter');
      setTimeout(() => {
        setAnimState('idle');
      }, DURATION + STAGGER * 2);
    }, FADE_DURATION);
  };

  return { page, animState, next };
}`;

    return '';
  }

  function copyCurrentTab() {
    navigator.clipboard.writeText(getCodeText(currentTab)).then(() => {
      const box = document.getElementById('codeOutput');
      const hint = box.querySelector('.code-copy-hint');
      hint.style.opacity = '1';
      hint.textContent = '✓ 복사됨';
      hint.style.color = '#00A86B';
      setTimeout(() => { hint.textContent = '클릭해서 복사'; hint.style.color = ''; hint.style.opacity = ''; }, 1500);
    });
  }

  function copyCss() {
    navigator.clipboard.writeText(getCodeText(currentTab)).then(() => flashBtn('btn-css'));
  }

  function downloadHtml() {
    const html = document.documentElement.outerHTML;
    const blob = new Blob([html], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `animation-sample-d${config.duration}-s${config.stagger}-${config.easing.replace(/[^a-z]/g,'-')}.html`;
    a.click();
    URL.revokeObjectURL(a.href);
    flashBtn('btn-html');
  }

  // 초기 렌더
  const wrapper = document.getElementById('listWrapper');
  wrapper.appendChild(buildBlock(pages[current]));
  loadFromHash();
  applyConfig();
  updateConfig();
  renderCode();

  function switchPage() {
    if (animating) return;
    animating = true;

    const next = (current + 1) % pages.length;

    const icon = document.getElementById('footerIcon');
    icon.classList.remove('spin');
    void icon.offsetWidth;
    icon.classList.add('spin');

    const oldBlock = wrapper.querySelector('.list-block');
    oldBlock.classList.add('exit');

    const newBlock = buildBlock(pages[next]);
    newBlock.classList.add('enter');
    wrapper.appendChild(newBlock);

    oldBlock.addEventListener('animationend', () => oldBlock.remove(), { once: true });

    const items = newBlock.querySelectorAll('.follow-item');
    items[items.length - 1].addEventListener('animationend', () => {
      newBlock.classList.remove('enter');
      newBlock.querySelectorAll('.follow-item').forEach(el => el.style.removeProperty('opacity'));
      animating = false;
    }, { once: true });

    current = next;
  }
</script>

</body>
</html>
