<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1000, initial-scale=1.0" />
  <title>맞춤형 서비스 애니메이션 샘플</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #F3F4F5;
      font-family: Pretendard, 'Noto Sans KR', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 32px;
      padding: 40px 24px;
    }

    /* ────────────────────────────────
       카드 (모바일 프리뷰)
    ──────────────────────────────── */
    .card {
      width: 358px;
      flex-shrink: 0;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 2px 12px rgba(6,11,17,0.08);
    }

    .card__header {
      padding: 20px 20px 16px;
      font-size: 16px;
      font-weight: 700;
      color: #060B11;
      border-bottom: 1px solid rgba(6,11,17,0.06);
    }

    .list-wrapper {
      position: relative;
      overflow: hidden;
      height: 232px;
    }

    .list-block {
      position: absolute;
      top: 0; left: 0; right: 0;
    }

    .list-block.exit {
      animation: blockFadeOut var(--fade-duration, 180ms) ease-out forwards;
    }

    @keyframes blockFadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    @keyframes itemSlideUp {
      from { opacity: 0; transform: translateY(var(--slide-distance, 60px)); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .list-block.enter .menu-item {
      opacity: 0;
      animation: itemSlideUp var(--item-duration, 350ms) var(--easing, ease-in) forwards;
    }

    .list-block.enter .menu-item:nth-child(1) { animation-delay: 0ms; }
    .list-block.enter .menu-item:nth-child(2) { animation-delay: var(--stagger, 50ms); }
    .list-block.enter .menu-item:nth-child(3) { animation-delay: calc(var(--stagger, 50ms) * 2); }
    .list-block.enter .menu-item:nth-child(4) { animation-delay: calc(var(--stagger, 50ms) * 3); }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 20px;
      height: 58px;
      cursor: pointer;
    }

    .menu-item__icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .menu-item__label {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
      color: #060B11;
      line-height: 1.4;
    }

    .menu-item__chevron { color: rgba(6,11,17,0.28); flex-shrink: 0; }

    .card__footer {
      border-top: 1px solid rgba(6,11,17,0.06);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      border-radius: 0 0 20px 20px;
      transition: background 0.15s;
    }
    .card__footer:active { background: rgba(6,11,17,0.03); }

    .footer__icon svg { display: block; }
    .footer__icon.spin svg { animation: spinOnce 0.45s cubic-bezier(0.22,1,0.36,1); }
    @keyframes spinOnce {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .footer__text { font-size: 13px; font-weight: 500; color: rgba(6,11,17,0.54); }
    .footer__page { font-weight: 600; color: rgba(6,11,17,0.38); }

    /* ────────────────────────────────
       컨트롤 패널
    ──────────────────────────────── */
    .panel {
      width: 300px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 2px 12px rgba(6,11,17,0.08);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-self: flex-start;
    }

    .panel__title {
      font-size: 15px;
      font-weight: 700;
      color: #060B11;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(6,11,17,0.06);
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .control__label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(6,11,17,0.54);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .control__value {
      font-size: 13px;
      font-weight: 700;
      color: #060B11;
      min-width: 52px;
      text-align: right;
    }

    input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #E5E7EA;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #060B11;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(6,11,17,0.2);
    }

    /* easing 선택 버튼 */
    .easing-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .easing-btn {
      padding: 8px 0;
      font-size: 12px;
      font-weight: 600;
      color: rgba(6,11,17,0.54);
      background: #F3F4F5;
      border: 1.5px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }

    .easing-btn.active {
      color: #060B11;
      background: #fff;
      border-color: #060B11;
    }

    /* 구분선 */
    .divider {
      height: 1px;
      background: rgba(6,11,17,0.06);
    }

    /* 재생 버튼 */
    .play-btn {
      width: 100%;
      padding: 13px;
      background: #FFCD00;
      color: #060B11;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .play-btn:active { opacity: 0.8; }

    /* 공유 버튼 그룹 */
    .share-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .share-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 0;
      font-size: 12px;
      font-weight: 600;
      border: 1.5px solid rgba(6,11,17,0.12);
      border-radius: 10px;
      background: #fff;
      color: #060B11;
      cursor: pointer;
      transition: all 0.15s;
    }
    .share-btn:active { background: #F3F4F5; }
    .share-btn.copied {
      border-color: #00A86B;
      color: #00A86B;
    }

    /* CSS 코드 출력 */
    .code-box {
      background: #F3F4F5;
      border-radius: 10px;
      padding: 12px;
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: rgba(6,11,17,0.7);
      line-height: 1.7;
      white-space: pre;
      overflow-x: auto;
      cursor: pointer;
      position: relative;
      transition: background 0.15s;
    }
    .code-box:hover { background: #EAEBEC; }
    .code-copy-hint {
      position: absolute;
      top: 8px; right: 8px;
      font-size: 10px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: rgba(6,11,17,0.3);
    }
  </style>
</head>
<body>

<!-- 카드 프리뷰 -->
<div class="card">
  <div class="card__header">조민형님을 위한 맞춤형 서비스</div>
  <div class="list-wrapper" id="listWrapper"></div>
  <div class="card__footer" onclick="switchPage()">
    <span class="footer__icon" id="footerIcon">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M14 8A6 6 0 1 1 8 2" stroke="rgba(6,11,17,0.54)" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M11 2l3 0 0 3" stroke="rgba(6,11,17,0.54)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
    <span class="footer__text">다른 서비스 더 보기 <span class="footer__page" id="pageText"></span></span>
  </div>
</div>

<!-- 컨트롤 패널 -->
<div class="panel">
  <div class="panel__title">애니메이션 조절</div>

  <!-- Duration -->
  <div class="control">
    <div class="control__header">
      <span class="control__label">Duration</span>
      <span class="control__value" id="val-duration">350ms</span>
    </div>
    <input type="range" id="ctrl-duration" min="100" max="800" step="10" value="350"
      oninput="updateConfig()">
  </div>

  <!-- Stagger -->
  <div class="control">
    <div class="control__header">
      <span class="control__label">Stagger</span>
      <span class="control__value" id="val-stagger">50ms</span>
    </div>
    <input type="range" id="ctrl-stagger" min="0" max="150" step="5" value="50"
      oninput="updateConfig()">
  </div>

  <!-- Slide Distance -->
  <div class="control">
    <div class="control__header">
      <span class="control__label">Slide Distance</span>
      <span class="control__value" id="val-distance">60px</span>
    </div>
    <input type="range" id="ctrl-distance" min="10" max="120" step="5" value="60"
      oninput="updateConfig()">
  </div>

  <!-- Fade Duration -->
  <div class="control">
    <div class="control__header">
      <span class="control__label">Fade-out Duration</span>
      <span class="control__value" id="val-fade">180ms</span>
    </div>
    <input type="range" id="ctrl-fade" min="50" max="400" step="10" value="180"
      oninput="updateConfig()">
  </div>

  <div class="divider"></div>

  <!-- Easing -->
  <div class="control">
    <div class="control__header">
      <span class="control__label">Easing</span>
    </div>
    <div class="easing-grid">
      <button class="easing-btn active" data-easing="ease-in" onclick="setEasing(this)">ease-in</button>
      <button class="easing-btn" data-easing="ease-out" onclick="setEasing(this)">ease-out</button>
      <button class="easing-btn" data-easing="ease-in-out" onclick="setEasing(this)">ease-in-out</button>
      <button class="easing-btn" data-easing="linear" onclick="setEasing(this)">linear</button>
      <button class="easing-btn" data-easing="cubic-bezier(0.22,1,0.36,1)" onclick="setEasing(this)">spring</button>
      <button class="easing-btn" data-easing="cubic-bezier(0.34,1.56,0.64,1)" onclick="setEasing(this)">bounce</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 재생 버튼 -->
  <button class="play-btn" onclick="switchPage()">▶ 애니메이션 실행</button>

  <div class="divider"></div>

  <!-- 공유 버튼들 -->
  <div class="control__label" style="margin-bottom:-8px">공유하기</div>
  <div class="share-group">
    <button class="share-btn" id="btn-link" onclick="copyLink()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M5.5 8.5l3-3M8 5.5a2 2 0 0 1 2.83 2.83l-1.5 1.5A2 2 0 0 1 6.5 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M6 8.5a2 2 0 0 1-2.83-2.83l1.5-1.5A2 2 0 0 1 7.5 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      링크 복사
    </button>
    <button class="share-btn" id="btn-css" onclick="copyCss()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <rect x="1" y="2" width="8" height="10" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M4 5h4M4 7.5h3M4 10h2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M9 4l4 0M9 7l4 0M9 10l4 0" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity=".3"/>
      </svg>
      CSS 복사
    </button>
    <button class="share-btn" id="btn-html" onclick="downloadHtml()" style="grid-column: span 2;">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v8M4.5 6.5L7 9l2.5-2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 10v1.5A1.5 1.5 0 0 0 3.5 13h7A1.5 1.5 0 0 0 12 11.5V10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      HTML 파일 다운로드
    </button>
  </div>

  <!-- 코드 출력 -->
  <div class="code-box" id="codeOutput" onclick="copyCss()" title="클릭해서 복사">
    <span class="code-copy-hint">클릭해서 복사</span>
  </div>
</div>

<script>
  const pages = [
    [
      { icon: '🏦', bg: '#FFF6E0', label: '세금 아끼는 RIA계좌 보러가기' },
      { icon: '✅', bg: '#E8F8F0', label: '출석체크하고 적립금 받기' },
      { icon: '🧒', bg: '#E8F0FF', label: '아이 계좌 만들고 2만원 받기' },
      { icon: '✨', bg: '#EEF0FF', label: '토스증권 AI가 찾은 시그널 보기' },
    ],
    [
      { icon: '🎫', bg: '#FFF3E0', label: '오늘의 미션 확인하기' },
      { icon: '📢', bg: '#FFF0F0', label: '어닝콜 모아보기' },
      { icon: '🛵', bg: '#E8F4FF', label: '배민클럽 2개월 무료 이벤트 보기' },
      { icon: '🟢', bg: '#E8F8F0', label: 'ETF 투자하기' },
    ],
  ];

  const chevron = `<svg width="7" height="12" viewBox="0 0 7 12" fill="none">
    <path d="M1 1l5 5-5 5" stroke="rgba(6,11,17,0.28)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;

  let current = 1;
  let animating = false;

  // 현재 설정값
  let config = {
    duration: 350,
    stagger: 50,
    distance: 60,
    fade: 180,
    easing: 'ease-in',
  };

  function applyConfig() {
    const root = document.documentElement;
    root.style.setProperty('--item-duration', config.duration + 'ms');
    root.style.setProperty('--stagger', config.stagger + 'ms');
    root.style.setProperty('--slide-distance', config.distance + 'px');
    root.style.setProperty('--fade-duration', config.fade + 'ms');
    root.style.setProperty('--easing', config.easing);
  }

  function updateConfig() {
    config.duration = +document.getElementById('ctrl-duration').value;
    config.stagger   = +document.getElementById('ctrl-stagger').value;
    config.distance  = +document.getElementById('ctrl-distance').value;
    config.fade      = +document.getElementById('ctrl-fade').value;

    document.getElementById('val-duration').textContent = config.duration + 'ms';
    document.getElementById('val-stagger').textContent  = config.stagger + 'ms';
    document.getElementById('val-distance').textContent = config.distance + 'px';
    document.getElementById('val-fade').textContent     = config.fade + 'ms';

    applyConfig();
    saveToHash();
    renderCode();
  }

  function setEasing(btn) {
    document.querySelectorAll('.easing-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    config.easing = btn.dataset.easing;
    applyConfig();
    saveToHash();
    renderCode();
  }

  function renderCode() {
    const box = document.getElementById('codeOutput');
    // hint span 유지
    box.childNodes.forEach(n => { if (n.nodeType === 3) n.remove(); });
    const hint = box.querySelector('.code-copy-hint');
    box.textContent = getCssCode();
    if (hint) box.appendChild(hint);
  }

  function buildBlock(items) {
    const block = document.createElement('div');
    block.className = 'list-block';
    block.innerHTML = items.map(item => `
      <div class="menu-item">
        <div class="menu-item__icon" style="background:${item.bg}">${item.icon}</div>
        <div class="menu-item__label">${item.label}</div>
        <span class="menu-item__chevron">${chevron}</span>
      </div>
    `).join('');
    return block;
  }

  function updatePageText() {
    document.getElementById('pageText').textContent = `${current + 1} / ${pages.length}`;
  }

  // ── URL 해시로 설정 불러오기 ──
  function loadFromHash() {
    try {
      const hash = location.hash.slice(1);
      if (!hash) return;
      const params = new URLSearchParams(hash);
      if (params.get('d'))  { config.duration = +params.get('d');  document.getElementById('ctrl-duration').value = config.duration; }
      if (params.get('s'))  { config.stagger  = +params.get('s');  document.getElementById('ctrl-stagger').value  = config.stagger; }
      if (params.get('di')) { config.distance = +params.get('di'); document.getElementById('ctrl-distance').value = config.distance; }
      if (params.get('f'))  { config.fade     = +params.get('f');  document.getElementById('ctrl-fade').value     = config.fade; }
      if (params.get('e'))  {
        config.easing = decodeURIComponent(params.get('e'));
        document.querySelectorAll('.easing-btn').forEach(b => {
          b.classList.toggle('active', b.dataset.easing === config.easing);
        });
      }
    } catch(e) {}
  }

  function saveToHash() {
    const p = new URLSearchParams({
      d: config.duration, s: config.stagger,
      di: config.distance, f: config.fade,
      e: encodeURIComponent(config.easing),
    });
    history.replaceState(null, '', '#' + p.toString());
  }

  // ── 공유 기능 ──
  function flashBtn(id, label) {
    const btn = document.getElementById(id);
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 1800);
  }

  function copyLink() {
    saveToHash();
    navigator.clipboard.writeText(location.href).then(() => flashBtn('btn-link', '링크 복사'));
  }

  function getCssCode() {
    const s = config.stagger;
    return `.menu-item {
  animation: itemSlideUp ${config.duration}ms ${config.easing} forwards;
}

@keyframes itemSlideUp {
  from { opacity: 0; transform: translateY(${config.distance}px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* stagger delays */
.menu-item:nth-child(1) { animation-delay: 0ms; }
.menu-item:nth-child(2) { animation-delay: ${s}ms; }
.menu-item:nth-child(3) { animation-delay: ${s * 2}ms; }
.menu-item:nth-child(4) { animation-delay: ${s * 3}ms; }

/* fade-out (구 리스트) */
.list-block.exit {
  animation: blockFadeOut ${config.fade}ms ease-out forwards;
}`;
  }

  function copyCss() {
    navigator.clipboard.writeText(getCssCode()).then(() => flashBtn('btn-css', 'CSS 복사'));
  }

  function downloadHtml() {
    const html = document.documentElement.outerHTML;
    const blob = new Blob([html], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `animation-sample-d${config.duration}-s${config.stagger}-${config.easing.replace(/[^a-z]/g,'-')}.html`;
    a.click();
    URL.revokeObjectURL(a.href);
    flashBtn('btn-html', 'HTML 다운로드');
  }

  // 초기 렌더
  const wrapper = document.getElementById('listWrapper');
  const initBlock = buildBlock(pages[current]);
  wrapper.appendChild(initBlock);
  updatePageText();
  loadFromHash();
  applyConfig();
  updateConfig();
  renderCode();

  function switchPage() {
    if (animating) return;
    animating = true;

    const next = (current + 1) % pages.length;

    const icon = document.getElementById('footerIcon');
    icon.classList.remove('spin');
    void icon.offsetWidth;
    icon.classList.add('spin');

    const oldBlock = wrapper.querySelector('.list-block');
    oldBlock.classList.add('exit');

    const newBlock = buildBlock(pages[next]);
    newBlock.classList.add('enter');
    wrapper.appendChild(newBlock);

    oldBlock.addEventListener('animationend', () => oldBlock.remove(), { once: true });

    const items = newBlock.querySelectorAll('.menu-item');
    const lastItem = items[items.length - 1];
    lastItem.addEventListener('animationend', () => {
      newBlock.classList.remove('enter');
      newBlock.querySelectorAll('.menu-item').forEach(el => el.style.removeProperty('opacity'));
      animating = false;
    }, { once: true });

    current = next;
    updatePageText();
  }
</script>

</body>
</html>
